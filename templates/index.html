<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Orivox IA</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{

    background:#0f172a;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

}

#contenedor{

    width:100%;
    max-width:900px;
    height:100vh;

    background:#111827;

    display:flex;
    flex-direction:column;

}

header{

    background:#1f2937;

    padding:20px;

    text-align:center;

    font-size:30px;

    font-weight:bold;

    color:white;

    border-bottom:1px solid #374151;

}

#chat{

    flex:1;

    overflow-y:auto;

    padding:20px;

    display:flex;

    flex-direction:column;

    gap:15px;

}

.mensaje{

    max-width:80%;

    padding:14px;

    border-radius:18px;

    line-height:1.5;

    word-wrap:break-word;

}

.usuario{

    background:#2563eb;

    color:white;

    align-self:flex-end;

    border-bottom-right-radius:5px;

}

.ia{

    background:#374151;

    color:white;

    align-self:flex-start;

    border-bottom-left-radius:5px;

}

#barra{

    display:flex;

    gap:10px;

    padding:15px;

    background:#1f2937;

}

#pregunta{

    flex:1;

    padding:15px;

    border:none;

    outline:none;

    border-radius:12px;

    background:#374151;

    color:white;

    font-size:17px;

}

button{

    width:70px;

    border:none;

    border-radius:12px;

    cursor:pointer;

    background:#2563eb;

    color:white;

    font-size:18px;

}

button:hover{

    background:#1d4ed8;

}

.escribiendo{

    display:flex;

    gap:6px;

    align-self:flex-start;

    background:#374151;

    padding:15px;

    border-radius:18px;

}

.escribiendo span{

    width:8px;

    height:8px;

    border-radius:50%;

    background:white;

    animation:subir 1s infinite;

}

.escribiendo span:nth-child(2){

    animation-delay:.2s;

}

.escribiendo span:nth-child(3){

    animation-delay:.4s;

}

@keyframes subir{

0%{

transform:translateY(0);

opacity:.4;

}

50%{

transform:translateY(-8px);

opacity:1;

}

100%{

transform:translateY(0);

opacity:.4;

}

}

@media(max-width:700px){

header{

font-size:24px;

}

.mensaje{

max-width:92%;

font-size:16px;

}

button{

width:60px;

}

}

</style>

</head>

<body>

<div id="contenedor">

<header>

🤖 Orivox IA

</header>

<div id="chat"></div>

<div id="barra">

<input
id="pregunta"
placeholder="Escribe un mensaje...">

<button onclick="enviar()">

➤

</button>

</div>

</div>

<script>

const chat=document.getElementById("chat");

const caja=document.getElementById("pregunta");

caja.addEventListener("keydown",function(e){

if(e.key==="Enter"){

e.preventDefault();

enviar();

}

});

function agregarMensaje(texto,tipo){

let div=document.createElement("div");

div.className="mensaje "+tipo;

div.innerText=texto;

chat.appendChild(div);

chat.scrollTop=chat.scrollHeight;

}

async function enviar() {

    let pregunta = caja.value.trim();

    if (pregunta === "") return;

    // Mostrar la pregunta del usuario
    document.getElementById("chat").innerHTML +=
        "<p><b>Tú:</b> " + pregunta + "</p>";

    caja.value = "";

    let respuesta = await fetch("/preguntar", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "pregunta=" + encodeURIComponent(pregunta)
    });

    let texto = await respuesta.text();

    document.getElementById("chat").innerHTML +=
        "<p><b>Orivox IA:</b> " + texto + "</p>";

    window.scrollTo(0, document.body.scrollHeight);
}


</script>

</body>

</html>
