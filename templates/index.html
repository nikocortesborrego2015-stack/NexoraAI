<!DOCTYPE html>
<html>
<head>
<title>Orivox IA</title>

<style>
body {
    background: linear-gradient(135deg, #020024, #090979, #00d4ff);
    color: white;
    font-family: Arial;
    text-align: center;
}

h1 {
    font-size: 45px;
}

#chat {
    margin: 20px;
    padding: 10px;
}

input {
    padding: 10px;
    width: 300px;
}

button {
    padding: 10px;
    cursor: pointer;
}
</style>

</head>

<body>

<h1>Orivox IA</h1>

<div id="chat"></div>

<input id="pregunta" placeholder="Escribe tu pregunta">
<button onclick="enviar()">Enviar</button>

<script>

const caja = document.getElementById("pregunta");

// Enviar con Enter
caja.addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        event.preventDefault();
        enviar();
    }
});

async function enviar() {

    let pregunta = caja.value.trim();

    let pregunta = caja.value.trim();

if (pregunta === "") return;

// Mostrar la pregunta del usuario
document.getElementById("chat").innerHTML +=
    "<p><b>Tú:</b> " + pregunta + "</p>";

caja.value = "";

let respuesta = await fetch("/preguntar", {
    method: "POST",
    headers: {
        "Content-Type": "application/x-www-form-urlencoded"
    },
    body: "pregunta=" + encodeURIComponent(pregunta)
});

let texto = await respuesta.text();

// Mostrar la respuesta de Orivox IA
document.getElementById("chat").innerHTML +=
    "<p><b>Orivox IA:</b> " + texto + "</p>";

window.scrollTo(0, document.body.scrollHeight);
}

</script>

</body>
</html>
