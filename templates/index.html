<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Orivox IA</title>
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:#0f172a;

height:100vh;

overflow:hidden;

}
#app{

height:100vh;

display:flex;

flex-direction:column;

background:#111827;

}

header{

height:70px;

display:flex;

justify-content:center;

align-items:center;

background:#111827;

border-bottom:1px solid #293548;

color:white;

font-size:28px;

font-weight:bold;

}
#app{

height:100vh;

display:flex;

flex-direction:column;

background:#111827;

}

header{

height:70px;

display:flex;

justify-content:center;

align-items:center;

background:#111827;

border-bottom:1px solid #293548;

color:white;

font-size:28px;

font-weight:bold;

}

#chat{

flex:1;

overflow-y:auto;

padding:25px;

display:flex;

flex-direction:column;

}

#bienvenida{

margin:auto;

text-align:center;

color:#94a3b8;

}

#bienvenida h1{

color:white;

margin-bottom:15px;

}

#inferior{

padding:18px;

display:flex;

justify-content:center;

background:#111827;

border-top:1px solid #293548;

}

#pregunta{

width:100%;

max-width:900px;

padding:16px;

border:none;

outline:none;

border-radius:18px;

background:#1f2937;

color:white;

font-size:17px;

}

#enviar{

margin-left:12px;

width:60px;

height:60px;

border:none;

border-radius:50%;

background:#2563eb;

color:white;

cursor:pointer;

font-size:22px;

}

#enviar:hover{

background:#1d4ed8;

}

@media(max-width:700px){

header{

font-size:23px;

}

#inferior{

padding:12px;

}

#pregunta{

font-size:16px;

}

#enviar{

width:55px;

height:55px;

}

}

</style>

</head>

<body>

<div id="app">

<header>

🤖 Orivox IA

</header>

<div id="chat">

<div id="bienvenida">

<h1>Hola 👋</h1>

<p>¿En qué puedo ayudarte hoy?</p>

</div>

</div>

<div id="inferior">

<input
type="text"
id="pregunta"
placeholder="Escribe un mensaje...">

<button id="enviar">

➤

</button>

</div>

</div>

<script>

const caja = document.getElementById("pregunta");
const boton = document.getElementById("enviar");

// Enviar con Enter
caja.addEventListener("keydown", function(e){

    if(e.key==="Enter"){

        e.preventDefault();

        enviar();

    }

});

// Enviar con botón
boton.addEventListener("click", enviar);

async function enviar(){

    let pregunta = caja.value.trim();
    if (pregunta === "") return;

// Mostrar el mensaje del usuario inmediatamente

if (bienvenida) bienvenida.remove();

let usuario = document.createElement("div");
usuario.className = "mensaje usuario";
usuario.textContent = pregunta;
chat.appendChild(usuario);

chat.scrollTop = chat.scrollHeight;

caja.value = "";

    if(pregunta==="") return;

    let respuesta = await fetch("/preguntar",{

        method:"POST",

        headers:{

            "Content-Type":"application/x-www-form-urlencoded"

        },

        body:"pregunta="+encodeURIComponent(pregunta)

    });

    let texto = await respuesta.text();

   // Quitar el mensaje de bienvenida
let bienvenida = document.getElementById("bienvenida");
if (bienvenida) bienvenida.remove();

// Mensaje de la IA
let ia = document.createElement("div");
ia.className = "mensaje ia";
ia.textContent = texto;
chat.appendChild(ia);

// Bajar el chat automáticamente
chat.scrollTop = chat.scrollHeight;

}

</script>

</body>

</html>
